name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure x64
        run: cmake -S . -B build64 -G "Visual Studio 17 2022" -A x64 -DBUILD_BOTH_ARCHES=OFF -DX64DBG_DOWNLOAD_SDK=ON

      - name: Build x64
        run: cmake --build build64 --config Release

      - name: Configure x86
        run: cmake -S . -B build32 -G "Visual Studio 17 2022" -A Win32 -DBUILD_BOTH_ARCHES=OFF -DX64DBG_DOWNLOAD_SDK=OFF

      - name: Build x86
        run: cmake --build build32 --config Release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build64/Release/MCPx64dbg.dp64 dist/ -ErrorAction Stop
          Copy-Item build32/Release/MCPx64dbg.dp32 dist/ -ErrorAction Stop
          Copy-Item src/x64dbg.py dist/ -ErrorAction Stop

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath x64dbgMCP-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: x64dbgMCP ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            x64dbgMCP-${{ github.ref_name }}.zip
            dist/MCPx64dbg.dp64
            dist/MCPx64dbg.dp32
            dist/x64dbg.py
