name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (both architectures)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -DX64DBG_DOWNLOAD_SDK=ON -DBUILD_BOTH_ARCHES=ON

      - name: Build plugins
        run: cmake --build build --target all_plugins --config Release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build/build64/Release/MCPx64dbg.dp64 dist/ -ErrorAction Stop
          Copy-Item build/build32/Release/MCPx64dbg.dp32 dist/ -ErrorAction Stop
          Copy-Item src/x64dbg.py dist/ -ErrorAction Stop

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath x64dbgMCP-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: x64dbgMCP ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            x64dbgMCP-${{ github.ref_name }}.zip
            dist/MCPx64dbg.dp64
            dist/MCPx64dbg.dp32
            dist/x64dbg.py
